<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
  
  body { 
    margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Inter', sans-serif;
  }

  .slide { 
    width: 600px; height: 600px;
    background-color: #080517; /* Navy blue Master da Logo */
    background-image: 
      linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
    background-size: 30px 30px; /* Grid effect de Tecnologia */
    position: relative; overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    display: flex; flex-direction: column; align-items: center;
    color: white;
  }

  /* TOP TEXT */
  .top-text {
    margin-top: 55px; font-size: 26px; font-weight: 400; letter-spacing: -0.5px;
  }
  .highlight { color: #65c52c; font-weight: 800; display: inline-block; padding: 0;}

  /* CENTRAL IMAGE VIRTUAL */
  .image-box {
    width: 82%; height: 180px; margin-top: 25px;
    border-radius: 12px; overflow: hidden;
    box-shadow: 0 10px 40px rgba(101, 197, 44, 0.15); /* Glow verde leve */
    background-image: url('file:///C:/Users/gabri/.gemini/antigravity/brain/ce43a813-4d2d-4e80-893d-a1c193dc1863/gp_fundo_tech_1_1775429739493.png');
    background-size: cover; background-position: center;
    border: 1px solid rgba(101, 197, 44, 0.3);
  }

  /* TAGS X */
  .tags-container {
    display: flex; gap: 20px; margin-top: 25px;
  }
  .tag {
    background: rgba(255,255,255,0.03); padding: 8px 18px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.05);
    font-size: 15px; font-weight: 400; display: flex; align-items: center; gap: 8px;
  }
  .icon-x {
    color: #ff4747; font-weight: bold; border: 1px solid #ff4747; border-radius: 50%;
    width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; font-size: 10px;
  }

  /* BOTTOM TEXT */
  .bottom-text {
    margin-top: 40px; font-size: 25px; font-weight: 400; text-align: center; width: 75%; line-height: 1.35; letter-spacing: -0.5px;
  }
  .bottom-text span { font-weight: 800; color: #65c52c; }

  /* LOGO FLUTUANTE DA GREEN POWER MISTURADA NO FUNDO */
  .logo {
    position: absolute; bottom: 15px; height: 50px;
    mix-blend-mode: screen; /* Truque magico: Se a logo tiver fundo escuro, ela deleta o fundo e deixa so o claro */
    background-image: url('file:///C:/Users/gabri/.gemini/antigravity/brain/ce43a813-4d2d-4e80-893d-a1c193dc1863/media__1775425950548.png');
    background-size: contain; background-repeat: no-repeat; background-position: center;
    width: 250px;
    opacity: 0.95;
  }
  
  .swipe-btn {
    position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
    background: #e2e8f0; color: #000; width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.5);
  }

</style>
</head>
<body>
  <div class="slide">
    
    <div class="top-text">O que é a usina <span class="highlight">Green Power?</span></div>
    
    <div class="image-box"></div>
    
    <div class="tags-container">
      <div class="tag"><div class="icon-x">X</div> Não é fiação barata</div>
      <div class="tag"><div class="icon-x">X</div> Não é "taxa zerada"</div>
    </div>
    
    <div class="bottom-text">
      É um sistema inteligente de alta proteção patrimonial que <span>TRAVA</span> a subida anual absurda das tarifas.
    </div>
    
    <!-- Logo da G.P puxada do seu banco de dados -->
    <div class="logo"></div>

    <div class="swipe-btn">❮</div>
  </div>
</body>
</html>
